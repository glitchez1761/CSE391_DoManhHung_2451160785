<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia</title>
</head>
<body>
    <h1>Sản phẩm Multimedia</h1>

    <h2>Ảnh sản phẩm</h2>
    <figure style="max-width: 100%; height: auto;">
        <img src="https://placehold.co/300x200" alt="Sản phẩm Demo 1" loading="lazy">
        <figcaption>Ảnh sản phẩm Demo 1</figcaption>
    </figure>
    <figure style="max-width: 100%; height: auto;">
        <img src="https://placehold.co/300x200" alt="Sản phẩm Demo 2" loading="lazy">
        <figcaption>Ảnh sản phẩm Demo 2</figcaption>
    </figure>
    <figure style="max-width: 100%; height: auto;">
        <img src="https://placehold.co/300x200" alt="Sản phẩm Demo 3" loading="lazy">
        <figcaption>Ảnh sản phẩm Demo 3</figcaption>
    </figure>

    <h2>Video nhúng YouTube</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allowfullscreen loading="lazy"></iframe>

    <h2>Video tự Host</h2>
    <video controls poster="https://placehold.co/640x360" width="640">
        <source src="dummy.mp4" type="video/mp4">
        <source src="dummy.webm" type="video/webm">
        Trình duyệt của bạn không hỗ trợ thẻ video.
    </video>

    <h2>Audio Giới thiệu</h2>
    <audio controls>
        <source src="dummy.mp3" type="audio/mpeg">
        Trình duyệt của bạn không hỗ trợ thẻ audio.
    </audio>

    <h2>SVG Inline Logo</h2>
    <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
    </svg>
</body>
</html>
