<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh Toán B3</title>
</head>
<body>
    <h1>Form Đặt Hàng</h1>
    
    <table border="1">
        <thead>
            <tr>
                <th>STT</th>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Sản phẩm A</td>
                <td>100.000đ</td>
                <td>2</td>
                <td>200.000đ</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Sản phẩm B</td>
                <td>50.000đ</td>
                <td>1</td>
                <td>50.000đ</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Sản phẩm C</td>
                <td>20.000đ</td>
                <td>5</td>
                <td>100.000đ</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4" align="right"><strong>Tổng cộng:</strong></td>
                <td><output>350.000đ</output></td>
            </tr>
        </tfoot>
    </table>

    <p>Tiến trình tích luỹ quà tặng: <progress value="70" max="100"></progress> 70%</p>

    <form action="#" method="POST">
        <fieldset>
            <legend>Thanh toán</legend>
            <label>Phương thức:</label><br>
            <label><input type="radio" name="payment" value="cod" required> COD</label>
            <label><input type="radio" name="payment" value="bank"> Chuyển khoản</label>
            <label><input type="radio" name="payment" value="wallet"> Ví điện tử</label><br><br>

            <label for="coupon">Mã giảm giá:</label>
            <input type="text" id="coupon" name="coupon" pattern="^SALE\d{4}$" placeholder="Ví dụ: SALE2026" list="coupons">
            <datalist id="coupons">
                <option value="SALE2026">
                <option value="SALE9999">
            </datalist><br><br>

            <label for="notes">Ghi chú:</label><br>
            <textarea id="notes" name="notes" rows="4" cols="50"></textarea>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <label for="delivery_date">Ngày mong muốn (từ ngày mai):</label>
            <input type="date" id="delivery_date" name="delivery_date" min="2026-04-30" required><br><br>

            <label for="time_slot">Khung giờ:</label>
            <select id="time_slot" name="time_slot">
                <option value="morning">Sáng 8-12h</option>
                <option value="afternoon">Chiều 14-18h</option>
                <option value="evening">Tối 18-21h</option>
            </select><br><br>

            <label for="delivery_days">Thời gian giao (số ngày tối đa):</label>
            1 <input type="range" id="delivery_days" name="delivery_days" min="1" max="7" step="1" value="3"> 7
        </fieldset><br>

        <button type="submit" aria-label="Xác nhận đặt hàng">Xác nhận Đặt Hàng</button>
    </form>
</body>
</html>
