<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
</head>
<body>
    <h1>Đăng Ký Tài Khoản E-Commerce</h1>
    <form action="#" method="POST">
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label for="fullname">Họ tên:</label>
            <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nguyễn Văn A"><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="email@domain.com"><br><br>

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0901234567"><br><br>

            <label for="dob">Ngày sinh:</label>
            <input type="date" id="dob" name="dob" max="2026-04-29"><br><br>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" pattern="[A-Za-z0-9_]{3,20}" required placeholder="user_name_123"><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" required placeholder="Mật khẩu (có chữ hoa, số)"><br><br>

            <label for="confirm_password">Xác nhận password:</label>
            <input type="password" id="confirm_password" name="confirm_password" minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" required placeholder="Nhập lại mật khẩu"><br><br>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <label for="city">Thành phố:</label>
            <select id="city" name="city" required>
                <option value="">-- Chọn Thành phố --</option>
                <option value="hn">Hà Nội</option>
                <option value="hcm">TP Hồ Chí Minh</option>
                <option value="dn">Đà Nẵng</option>
                <option value="hp">Hải Phòng</option>
                <option value="ct">Cần Thơ</option>
            </select><br><br>

            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district" required>
                <option value="1">Quận 1</option>
                <option value="2">Quận 2</option>
            </select><br><br>

            <label for="address">Địa chỉ chi tiết:</label><br>
            <textarea id="address" name="address" rows="3" placeholder="Số nhà, đường..."></textarea><br><br>

            <label>Giới tính:</label>
            <label><input type="radio" name="gender" value="nam"> Nam</label>
            <label><input type="radio" name="gender" value="nu"> Nữ</label>
            <label><input type="radio" name="gender" value="khac"> Khác</label>
        </fieldset><br>

        <label>
            <input type="checkbox" name="terms" required> Tôi đồng ý với các điều khoản
        </label><br><br>

        <button type="submit">Đăng ký</button>
        <button type="reset">Làm mới</button>
    </form>
</body>
</html>
